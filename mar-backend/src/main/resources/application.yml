server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: mar-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    time-zone: UTC
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: mar-api

mar:
  cache:
    permission-profile:
      ttl: ${MAR_PERMISSION_PROFILE_CACHE_TTL:10m}
      maximum-size: ${MAR_PERMISSION_PROFILE_CACHE_MAX_SIZE:10000}
  security:
    cors:
      allowed-origins: ${MAR_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
    jwt:
      issuer: ${MAR_JWT_ISSUER:mar-api}
      secret: ${MAR_JWT_SECRET:change-me-local-development-secret-change-before-prod}
      access-token-expiration: ${MAR_JWT_ACCESS_TOKEN_EXPIRATION:60m}
  webhook:
    signature-secret: ${MAR_WEBHOOK_SIGNATURE_SECRET:change-me-local-webhook-secret-change-before-prod}
