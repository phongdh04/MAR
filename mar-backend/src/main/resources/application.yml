server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: mar-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
    time-zone: UTC
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    baseline-on-migrate: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: mar-api

mar:
  security:
    cors:
      allowed-origins: ${MAR_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
